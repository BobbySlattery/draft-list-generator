name: Update Draft List

# When this runs:
#  - every 15 minutes via cron (best-effort; GitHub may delay during high load)
#  - whenever you push code changes to main
#  - manually via the "Run workflow" button on the Actions page
on:
  schedule:
    - cron: "*/15 * * * *"
  push:
    branches: [main]
  workflow_dispatch:

# One run at a time, cancel any in-progress run if a new one fires
concurrency:
  group: "pages"
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate Deerfield draft list
        env:
          TOAST_CLIENT_ID:       ${{ secrets.TOAST_CLIENT_ID }}
          TOAST_CLIENT_SECRET:   ${{ secrets.TOAST_CLIENT_SECRET }}
          TOAST_RESTAURANT_GUID: ${{ secrets.DEERFIELD_GUID }}
          DRAFT_GROUP_NAME:      "Draft Beer"
          EXPECTED_TAP_COUNT:    "24"
          BAR_NAME:              "Fifty West - Deerfield"
        run: |
          mkdir -p site/deerfield
          python generate_draft_list.py --output-dir site/deerfield

      # Wooster Pike — uncomment when you're ready to add the second location
      #
      # - name: Generate Wooster Pike draft list
      #   env:
      #     TOAST_CLIENT_ID:       ${{ secrets.TOAST_CLIENT_ID }}
      #     TOAST_CLIENT_SECRET:   ${{ secrets.TOAST_CLIENT_SECRET }}
      #     TOAST_RESTAURANT_GUID: ${{ secrets.WOOSTER_PIKE_GUID }}
      #     DRAFT_GROUP_NAME:      "Draft Beer 1"
      #     EXPECTED_TAP_COUNT:    "16"
      #     BAR_NAME:              "Fifty West - Wooster Pike"
      #   run: |
      #     mkdir -p site/wooster-pike
      #     python generate_draft_list.py --output-dir site/wooster-pike

      - name: Build landing index page
        run: |
          cat > site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Fifty West — Draft Lists</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, sans-serif;
                     max-width: 600px; margin: 4rem auto; padding: 0 1rem;
                     background: #fff; color: #503629; }
              h1 { font-family: Georgia, serif; }
              a { color: #C06B13; font-weight: 600; text-decoration: none; }
              a:hover { text-decoration: underline; }
              ul { padding-left: 1.2rem; line-height: 2; }
            </style>
          </head>
          <body>
            <h1>Fifty West — Draft Lists</h1>
            <ul>
              <li><a href="deerfield/draft_list.html">Deerfield — Live tap list</a> · <a href="deerfield/draft_list.pdf">PDF</a></li>
              <!-- <li><a href="wooster-pike/draft_list.html">Wooster Pike — Live tap list</a> · <a href="wooster-pike/draft_list.pdf">PDF</a></li> -->
            </ul>
            <p style="color:#888;font-size:.85em;margin-top:3rem">Pulled live from Toast POS. Refreshes every 15 minutes.</p>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
